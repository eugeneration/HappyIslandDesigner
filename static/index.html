    <script>
      // Prevent site from being embedded in iframes by unauthorized origins
      // Add trusted domains to this list to allow specific sites to iframe the app
      var ALLOWED_IFRAME_HOSTS = [
        // 'example.com',
      ];
      if (window.top !== window.self) {
        var shouldBlock = true;
        try {
          var parentHost = window.top.location.hostname;
          shouldBlock = !ALLOWED_IFRAME_HOSTS.some(function(host) {
            return parentHost === host || parentHost.endsWith('.' + host);
          });
        } catch (e) {
          // Cross-origin iframe — can't read parent host, block it
        }
        if (shouldBlock) {
          try {
            window.top.location.replace(window.location.href);
          } catch (e) {
            // Sandboxed iframe — redirect blocked, hide all content
            document.documentElement.innerHTML = '';
          }
        }
      }
    </script>

    <script>
      // Detect non-production sites (forks, local dev) and downrank them
      var PRODUCTION_HOST = 'eugeneration.github.io';
      var isDevSite = window.location.hostname !== PRODUCTION_HOST;
      if (isDevSite) {
        var meta = document.createElement('meta');
        meta.name = 'robots';
        meta.content = 'noindex, nofollow';
        document.head.appendChild(meta);
      }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-159461234-1"></script>

    <script>
      if (isDevSite) {
        var banner = document.getElementById('dev-site-banner');
        banner.style.display = 'block';
        setTimeout(function() {
          banner.style.opacity = '0';
          banner.style.pointerEvents = 'none';
        }, 5000);
